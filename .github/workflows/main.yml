name: Mason Asset Reporter
on:
  schedule:
    - cron: '30 22 * * *' # 한국 시간 아침 7시 30분
  workflow_dispatch: # 이 줄이 있어야 'Run workflow' 버튼이 생깁니다!

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install yfinance requests pynacl pandas

      - name: Update Secret from Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python updater.py

      - name: Send Daily Report
        env:
          # 시크릿에 등록된 값들을 불러옵니다
          MY_HOLDINGS: ${{ secrets.MY_HOLDINGS }}
          MY_SEED: ${{ secrets.MY_SEED }}
          MY_DEBT: ${{ secrets.MY_DEBT }}
          MY_PROFIT: ${{ secrets.MY_PROFIT }}
          MY_DIVISIONS: ${{ secrets.MY_DIVISIONS }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
