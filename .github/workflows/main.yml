name: Mason Asset Reporter
on:
  schedule:
    - cron: '30 22 * * *' # 한국 시간 아침 7시 30분 자동 실행
  workflow_dispatch: # 수동 실행 버튼

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install yfinance requests pynacl pandas

      # [1단계] 텔레그램 명령 확인 및 시크릿 업데이트
      - name: Update Secret from Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python updater.py

      # [2단계] 최신화된 시크릿을 기반으로 리포트 생성 (여기가 누락되었습니다!)
      - name: Send Daily Report
        env:
          MY_HOLDINGS: ${{ secrets.MY_HOLDINGS }}
          MY_SEED: ${{ secrets.MY_SEED }}
          MY_DEBT: ${{ secrets.MY_DEBT }}
          MY_PROFIT: ${{ secrets.MY_PROFIT }}
          MY_DIVISIONS: ${{ secrets.MY_DIVISIONS }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
