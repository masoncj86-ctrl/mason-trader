name: Mason Real-Time Report

on:
  schedule:
    - cron: '0 13 * * *' # 매일 오후 10시(KST) 지독하게 실행
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest
    # [추가] GitHub의 권고대로 Node.js 24를 미리 강제 적용하여 미래를 대비합니다.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # v3 대신 v4를 사용합니다.
      - name: Checkout Code
        uses: actions/checkout@v4

      # v4 대신 v5를 사용합니다.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install yfinance requests pandas

      - name: Run Mason Logic
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MY_SEED: ${{ vars.MY_SEED }}
          MY_HOLDINGS: ${{ vars.MY_HOLDINGS }}
          MY_DIVISIONS: ${{ vars.MY_DIVISIONS }}
        run: python mason.py  # 사령관님의 실제 파일명으로 수정 필수!
