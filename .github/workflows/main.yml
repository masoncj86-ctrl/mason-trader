name: Mason Asset Reporter
on:
  schedule:
    - cron: '30 22 * * *'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      # 1. 파일을 가져올 때 하위 폴더 생성 방지 (path: .)
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          path: .

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install yfinance requests pynacl pandas

      # 2. 실행 시 현재 디렉토리(./)에서 파일을 직접 실행
      - name: Update Secret from Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python ./updater.py

      - name: Send Daily Report
        env:
          MY_HOLDINGS: ${{ secrets.MY_HOLDINGS }}
          MY_SEED: ${{ secrets.MY_SEED }}
          MY_DEBT: ${{ secrets.MY_DEBT }}
          MY_PROFIT: ${{ secrets.MY_PROFIT }}
          MY_DIVISIONS: ${{ secrets.MY_DIVISIONS }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python ./main.py
