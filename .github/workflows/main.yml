name: Mason Real-Time Report

on:
  schedule:
    - cron: '0 13 * * *' # 매일 오후 10시(KST) 실행
  workflow_dispatch: # 수동 실행 버튼

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Node.js 24 강제 적용 경고는 유지하되, 통신에 집중합니다!
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install yfinance requests pandas
          
      - name: Run Mason Logic
        # [수정] 복잡한 env 설정을 다 걷어냈습니다. 
        # 이제 mason.py 내부에 하드코딩된 토큰을 직접 사용합니다!
        run: python mason.py
