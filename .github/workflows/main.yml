name: Mason Asset Reporter

on:
  schedule:
    - cron: '30 22 * * *' # 한국 시간 매일 아침 7시 30분
  workflow_dispatch: # 수동 실행 버튼

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      # 1. 파일을 가져올 때 경로가 꼬이지 않도록 현재 위치(.)에 바로 풉니다.
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          path: .

      # 2. 파이썬 환경 구축
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      # 3. 필수 라이브러리 설치
      - name: Install dependencies
        run: |
          pip install yfinance requests pynacl pandas

      # 4. [1단계] 텔레그램 메시지 채집 (updater.py 실행)
      - name: Update Secret from Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python ./updater.py

      # 5. [2단계] 자산 리포트 생성 (파일명을 mason.py로 지독하게 맞췄습니다!)
      - name: Send Daily Report
        env:
          MY_HOLDINGS: ${{ secrets.MY_HOLDINGS }}
          MY_SEED: ${{ secrets.MY_SEED }}
          MY_DEBT: ${{ secrets.MY_DEBT }}
          MY_PROFIT: ${{ secrets.MY_PROFIT }}
          MY_DIVISIONS: ${{ secrets.MY_DIVISIONS }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python ./mason.py
