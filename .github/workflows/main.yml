name: Mason Real-Time Report

on:
  schedule:
    - cron: '0 13 * * *' # 매일 오후 10시(KST) 실행
  workflow_dispatch: # 수동 실행 버튼

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install yfinance requests pandas
          
      - name: Run Mason Logic
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # 시크릿이 비어있으면 기본값을 쓰도록 지독하게 설정!
          MY_SEED: ${{ secrets.MY_SEED }}
          MY_HOLDINGS: ${{ secrets.MY_HOLDINGS }}
          MY_DIVISIONS: ${{ secrets.MY_DIVISIONS }}
        run: python mason.py
