name: Mason Asset Reporter
on:
  schedule:
    - cron: '30 22 * * *'
  workflow_dispatch: # 수동 실행 버튼

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      # [필수!] 사령관님의 파일들을 가상 서버로 지독하게 복사해오는 단계
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install yfinance requests pynacl pandas

# 1단계: 텔레그램 업데이트 (경로 없이 파일명만!)
      - name: Update Secret from Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python updater.py # 앞에 폴더명 붙이지 마십시오!

      # 2단계: 리포트 발송 (경로 없이 파일명만!)
      - name: Send Daily Report
        env:
          MY_HOLDINGS: ${{ secrets.MY_HOLDINGS }}
          MY_SEED: ${{ secrets.MY_SEED }}
          MY_DEBT: ${{ secrets.MY_DEBT }}
          MY_PROFIT: ${{ secrets.MY_PROFIT }}
          MY_DIVISIONS: ${{ secrets.MY_DIVISIONS }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py # 여기도 mason-trader/ 붙이지 마십시오!
